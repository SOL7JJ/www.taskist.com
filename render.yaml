services:
  - type: web
    name: taskist-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: taskist-db
          property: connectionString
      - key: CLIENT_URL
        fromService:
          type: web
          name: taskist-web
          property: url

  - type: web
    name: taskist-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: taskist-api
          property: url

databases:
  - name: taskist-db
    plan: free
